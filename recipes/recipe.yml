# Image Metadata
name: atomicBlue-Desktop
description: My Wayblue Hyprland (NVIDIA Open) image
base_image: ghcr.io/wayblueorg/hyprland-nvidia-open
image_version: latest

modules:
  # Injects custom configuration files from your 'system' directory into the root
  - type: files
    files:
      - source: system
        destination: /

  # System package management (DNF)
  - type: dnf
    repos:
      - copr:atim/starship # External repository for the Starship prompt
    install:
      # CLI Tools & Shell
      - micro
      - starship
      - git
      - neovim
      - nnn
      - zsh
      # System Utilities & Drivers
      - lm_sensors
      - nvidia-container-toolkit
      - tailscale
      # Desktop Environment (Hyprland) specific tools
      - chezmoi
      - cliphist
      - fuzzel
      - hyprpolkitagent
      - hyprshot
      - nwg-look
      - SwayNotificationCenter
      # Container orchestration
      - podman-compose
    remove:
      # Removing default browser to replace with Flatpak versions
      - firefox
      - firefox-langpacks
      # Specific hardware/protocol package removed per your system state
      - pipewire-config-raop

  # Manage background services
  - type: systemd
    system:
      enabled:
        - bluetooth.service
        - tailscaled.service

  # Declarative Flatpak installation
  - type: default-flatpaks
    configurations:
      - notify: true
        scope: system
        install:
          # Web Browsers
          - org.mozilla.firefox
          - app.zen_browser.zen

          # Communication & Security
          - com.discordapp.Discord
          - com.bitwarden.desktop

          # Productivity & Development
          - md.obsidian.Obsidian
          - org.libreoffice.LibreOffice
          - org.kde.kate
          - org.kde.okular
          - com.github.jeromerobert.pdfarranger
          - com.visualstudio.code

          # System Tools & Utilities
          - com.github.tchx84.Flatseal
          - io.github.flattool.Warehouse
          - io.podman_desktop.PodmanDesktop
          - org.gnome.clocks
          - org.gnome.Loupe

          # Media, Gaming & Hobbies
          - com.valvesoftware.Steam
          - org.prismlauncher.PrismLauncher
          - org.photoqt.PhotoQt
          - org.qbittorrent.qBittorrent
          - com.calibre_ebook.calibre

  # Generates cryptographic signatures for your image updates
  - type: signing
